name: ci

on:
  pull_request:
  push:
    branches: ["main"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: ci
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Show Swift environment
        run: |
          sw_vers
          swift --version

      - name: Build
        run: swift build

      - name: Core self-test
        run: swift run VachaVoxCoreSelfTest
